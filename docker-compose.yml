services:
  puslah-franken:
    container_name: puslah-franken
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - SERVER_NAME=:80
      - PHP_INI_MEMORY_LIMIT=512M
      - PHP_INI_MAX_EXECUTION_TIME=300
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8089:80"
    volumes:
      - .:/app
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - .:/var/www/html
    networks:
      - default
      - mysql-stack_mysql_network

  puslah-worker:
    container_name: puslah-worker
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=600
    volumes:
      - .:/app
    networks:
      - default
      - mysql-stack_mysql_network

networks:
  default: {}
  mysql-stack_mysql_network:
    external: true
